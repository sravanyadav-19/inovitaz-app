<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inovitaz • Maintenance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      background-color: #070d1f;
    }
    .glass {
      background: rgba(21, 27, 45, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(74, 225, 118, 0.1);
    }
    .accent-blue {
      color: #3b82f6;
    }
  </style>
</head>
<body class="text-white font-sans">
  <div class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-md w-full">
      
      <!-- Header -->
      <div class="flex justify-center mb-8">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 bg-[#3b82f6] rounded-xl flex items-center justify-center">
            <i class="fa-solid fa-microchip text-white text-2xl"></i>
          </div>
          <span class="text-3xl font-semibold tracking-tight">Inovitaz</span>
        </div>
      </div>

      <!-- Main Card -->
      <div class="glass rounded-2xl p-8 text-center">
        <div class="w-14 h-14 mx-auto mb-6 rounded-2xl bg-[#151b2d] flex items-center justify-center border border-[#3b82f6]/20">
          <i class="fa-solid fa-tools text-[#3b82f6] text-3xl"></i>
        </div>

        <h1 class="text-2xl font-semibold mb-3 tracking-tight">Under Maintenance</h1>
        <p class="text-[#8c909f] mb-8 text-[15px]">
          We're currently performing security upgrades and system improvements 
          to deliver a more reliable experience.
        </p>

        <div class="bg-[#0c1324] border border-[#424754] rounded-xl py-3 px-4 mb-8">
          <div class="flex items-center justify-center gap-2 text-sm">
            <i class="fa-regular fa-clock text-[#3b82f6]"></i>
            <span class="text-[#8c909f]">Expected back by</span>
            <span class="font-medium">Jun 15, 2026</span>
          </div>
        </div>

        <div class="text-sm text-[#8c909f]">
          For urgent inquiries, reach us at<br>
          <a href="mailto:inovitaz.help@gmail.com" 
             class="text-[#3b82f6] hover:underline font-medium">
            inovitaz.help@gmail.com
          </a>
        </div>
      </div>

      <p class="text-center text-xs text-[#424754] mt-8">
        Thank you for your patience.
      </p>
    </div>
  </div>
</body>
</html>
